version: '3.8'
services:
  storage-minio:
    image: 'minio/minio'
    command: 'server /data --console-address ":9001"'
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=password
    volumes:
      - 'minio-data:/data'
    deploy:
      resources:
        limits:
          memory: 256M
    network_mode: service:lazytainer-storage
    depends_on:
      - lazytainer-storage
    labels:
      - "lazytainer.group=minio"

volumes:
  minio-data:
