version: '3.8'
services:
  mq-redpanda:
    image: 'redpandadata/redpanda:latest'
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    environment:
      REDPANDA_AUTO_CREATE_TOPICS: "true"
      REDPANDA_DEFAULT_REPLICATION_FACTOR: 1
      REDPANDA_LOG_LEVEL: info
      REDPANDA_DEVELOPER_MODE: "true"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.5G
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
    labels:
      - "lazytainer.group=redpanda"

  mq-rabbitmq:
    image: 'rabbitmq:alpine'
    volumes:
      - 'rabbitmq-data:/var/lib/rabbitmq'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
    labels:
      - "lazytainer.group=rabbitmq"

  mq-nats:
    image: 'nats:latest'
    command:
      - '-js'
      - '-sd=/data/jetstream'
    volumes:
      - 'nats-data:/data/jetstream'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
    labels:
      - "lazytainer.group=nats"

  nats-box:
    image: 'natsio/nats-box:latest'
    restart: "no"
    entrypoint: ["/bin/sh"]
    command: ["-c", "tail -f /dev/null"]
    profiles:
      - tools
    network_mode: service:lazytainer
    depends_on:
      - lazytainer

volumes:
  redpanda-data:
  rabbitmq-data:
  nats-data:
